labels:
  addon: "true"
syncPolicyAppSet:
  preserveResourcesOnDeletion: true
goTemplate: true
goTemplateOptions: ["missingkey=error"]
repoURLValues: "'{{.metadata.annotations.addons_repo_url}}'"
repoURLValuesRevision: HEAD
repoURLValuesBasePath: "addons/"
project: default
namespace: argocd
useSelector: true
useStack: false
useStackChart: true
syncPolicy:
  automated:
    selfHeal: false
    allowEmpty: true
    prune: false
  retry:
    limit: -1
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 10m
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
valueFiles:
  - ""
useValuesFilePrefix: false
addons:
  argocd:
    enabled: false
    releaseName: argocd
    namespace: argocd
    chart: argo-cd
    repoUrl: https://argoproj.github.io/argo-helm
    targetRevision: "7.5.2"
    selector:
      matchExpressions:
        - key: enable_argocd
          operator: In
          values: ['true']
