apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            fleet_member: control-plane
        values:
          addonChart: gitops-bridge
  template:
    metadata:
      name: cluster-addons
      finalizers:
        # This is here only for workshop purposes. In a real-world scenario, you should not use this
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - ref: values
          repoURL: "{{.metadata.annotations.addons_repo_url}}"
          targetRevision: "{{.metadata.annotations.addons_repo_revision}}"
        - repoURL: "{{.metadata.annotations.addons_repo_url}}"
          path: "{{.metadata.annotations.addons_repo_basepath}}charts/{{.values.addonChart}}"
          targetRevision: "{{.metadata.annotations.addons_repo_revision}}"
          helm:
            valuesObject:
              # Enable only ArgoCD - AWS LBC and Karpenter managed by Auto Mode
              addons:
                argocd:
                  enabled: true
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/{{.metadata.annotations.addons_repo_basepath}}argocd/values.yaml"
      destination:
        namespace: argocd
        name: "{{.name}}"
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
