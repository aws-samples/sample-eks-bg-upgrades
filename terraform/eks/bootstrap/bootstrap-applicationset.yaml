apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
  - clusters:
      selector:
        matchLabels:
          environment: control-plane
  template:
    metadata:
      name: 'bootstrap'
    spec:
      project: default
      source:
        repoURL: '{{metadata.annotations.gitops_platform_url}}'
        path: '{{metadata.annotations.gitops_platform_basepath}}'
        targetRevision: '{{metadata.annotations.gitops_platform_revision}}'
        directory:
          recurse: true
      destination:
        namespace: 'argocd'
        name: '{{name}}'
      syncPolicy:
        automated:
          allowEmpty: true
